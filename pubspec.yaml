name: neatly
description: AI-powered document organiser
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^13.2.0

  # Database
  sqflite: ^2.3.0
  drift: ^2.16.0
  drift_sqflite: ^2.0.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # AI / HTTP
  http: ^1.2.0

  # Document parsing
  syncfusion_flutter_pdf: ^25.1.0
  docx_to_text: any
  archive: ^3.4.10
  xml: ^6.5.0

  # File handling
  file_picker: ^8.0.0
  share_plus: ^9.0.0
  open_file: ^3.3.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # UI
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  mime: ^1.0.5
  sqflite_common_ffi: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
